<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap CSS -->
    <link href="{% static 'bootstrap.min.css' %}" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
    />
    <!-- jquery -->
    <script src="{% static 'jquery-3.6.0.min.js' %}"></script>
    <title>{% block title %}Mik GYM{% endblock %}</title>
  </head>
  <body>
    <!-- Header -->
   {% include 'inc/header.html' %}
    <!-- Header End -->

    <!-- Main Start -->
   {% block content %} {% endblock %}
    <!-- End -->

   {% include 'inc/footer.html' %}
    <!-- Bootstrap Bundle -->
    <script src="{% static 'bootstrap.bundle.min.js' %}"></script>
    <script
      type="text/javascript"
      src="{% static 'lightbox2-2.11.3/dist/js/lightbox.min.js' %}"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'lightbox2-2.11.3/dist/css/lightbox.min.css' %}"
    />
  </body>
</html>
